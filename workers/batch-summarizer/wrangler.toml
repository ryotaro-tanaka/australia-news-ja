name = "news-ja-batch"
main = "index.ts"
compatibility_date = "2024-04-16"

[observability]
enabled = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "NEWS_TRANSLATIONS"
id = "60f52fbd7ad94b7bb79224184d4a8dc6"

[[queues.producers]]
binding = "NEWS_QUEUE"
queue = "news-queue"

[[queues.consumers]]
queue = "news-queue"
max_batch_size = 1
max_batch_timeout = 1

[triggers]
crons = ["0 6 * * *", "0 12 * * *"]
